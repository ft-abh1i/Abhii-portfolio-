name: Build portfolio

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: portfolio-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build static portfolio
        id: portfolio-build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 60 build.log
          exit 0

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-build-log
          path: build.log
          if-no-files-found: error
          retention-days: 3

      - name: Fail when build fails
        if: steps.portfolio-build.outputs.status != '0'
        run: exit 1

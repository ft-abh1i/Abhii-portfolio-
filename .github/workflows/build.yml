name: Build portfolio

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: portfolio-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Next.js portfolio
        run: npm run build

      - name: Verify native Next.js output
        run: npm run verify:build
